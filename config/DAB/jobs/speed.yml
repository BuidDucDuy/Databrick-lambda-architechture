# Speed Layer ETL Job Definition
resources:
  jobs:
    speed_etl:
      name: "Lambda Architecture - Speed ETL"
      description: "Real-time streaming processing from Kinesis"
      max_concurrent_runs: 1
      job_clusters:
        - job_cluster_key: "speed_cluster"
          new_cluster:
            spark_version: "13.3.x-scala2.12"
            node_type_id: "i3.xlarge"
            num_workers: 2
      tasks:
        # Stage 1: Ingest from Kinesis to Bronze
        - task_key: "ingest_bronze"
          description: "Stream events from Kinesis to Bronze layer"
          notebook_task:
            notebook_path: "/Workspace/src/speed_layer/bronze_layer/ingest_events_bronze"
          job_cluster_key: "speed_cluster"
          timeout_seconds: 0  # Continuous job

        # Stage 2: Transform Silver
        - task_key: "transform_silver"
          description: "Transform and validate events in Silver layer"
          notebook_task:
            notebook_path: "/Workspace/src/speed_layer/silver_layer/transform_events_silver"
          job_cluster_key: "speed_cluster"
          timeout_seconds: 0  # Continuous job
          depends_on:
            - task_key: "ingest_bronze"

        # Stage 3: Aggregate Gold (Windowed)
        - task_key: "aggregate_gold"
          description: "Create windowed analytics in Gold layer"
          notebook_task:
            notebook_path: "/Workspace/src/speed_layer/gold_layer/aggregate_events_gold"
          job_cluster_key: "speed_cluster"
          timeout_seconds: 0  # Continuous job
          depends_on:
            - task_key: "transform_silver"

      # Alerts
      email_notifications:
        on_failure:
          - "admin@example.com"
