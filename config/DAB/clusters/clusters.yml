# Cluster Definition for Batch Processing
resources:
  clusters:
    batch_cluster:
      cluster_name: "lambda-arch-batch"
      spark_version: "13.3.x-scala2.12"
      node_type_id: "i3.xlarge"
      num_workers: 2
      instance_pool_id: "{{env.INSTANCE_POOL_ID}}"
      autotermination_minutes: 30
      aws_attributes:
        availability: "SPOT"
        ebs_volume_count: 2
        ebs_volume_size: 100
      tags:
        env: "dev"
        purpose: "batch-processing"
        project: "lambda-architecture"
      spark_conf:
        "spark.databricks.delta.retentionDurationCheck.enabled": "false"
        "spark.databricks.cluster.profile": "singleNode"

# Cluster Definition for Speed Processing
resources:
  clusters:
    speed_cluster:
      cluster_name: "lambda-arch-speed"
      spark_version: "13.3.x-scala2.12"
      node_type_id: "i3.xlarge"
      num_workers: 2
      instance_pool_id: "{{env.INSTANCE_POOL_ID}}"
      autotermination_minutes: 60
      aws_attributes:
        availability: "SPOT"
        ebs_volume_count: 2
        ebs_volume_size: 100
      tags:
        env: "dev"
        purpose: "streaming-processing"
        project: "lambda-architecture"
      spark_conf:
        "spark.sql.streaming.checkpointLocation.parent": "/dbfs/checkpoints"
        "spark.databricks.delta.schema.autoMerge.enabled": "true"
