resources:
  jobs:
    speed_etl_serverless:
      name: "Lambda Architecture - Speed ETL Serverless"
      description: "Real-time streaming processing from Kinesis on serverless compute"
      max_concurrent_runs: 1

      tasks:
        # Stage 1: Ingest from Kinesis to Bronze
        - task_key: "ingest_bronze_streaming"
          spark_python_task:
            python_file: "/Workspace/Users/duybd@mz.co.kr/.bundle/lambda-architecture/dev/files/src/speed_layer/bronze_layer/ingest_data_streaming.py"
            base_parameters:
              - kinesis_stream: "databrick-lambda-architecture-events"
              - target_table: "dev.bronze_stream.bronze_batch_item_properties"
          environment_key: "default"
          timeout_seconds: 3600
        # Stage 2: Transform Silver
        - task_key: "transform_silver_streaming"
          spark_python_task:
            python_file: "/Workspace/Users/duybd@mz.co.kr/.bundle/lambda-architecture/dev/files/src/speed_layer/silver_layer/transform_events_silver.py"
            parameters:
              - "--source_table"
              - "dev.bronze_stream.bronze_batch_item_properties"
              - "--target_table"
              - "dev.silver_stream.silver_streaming_events"
          environment_key: "default"
          timeout_seconds: 0
          depends_on:
            - task_key: "ingest_bronze_streaming"

        # Stage 3: Aggregate Gold (Windowed)
        - task_key: "aggregate_gold_streaming"
          spark_python_task:
            python_file: "/Workspace/Users/duybd@mz.co.kr/.bundle/lambda-architecture/dev/files/src/speed_layer/gold_layer/aggregate_events_gold.py"
            parameters:
              - "--source_table"
              - "dev.silver_stream.silver_streaming_events"
              - "--visitor_profile"
              - "/dev/gold_stream/streaming_gold_visitor_profile/"
              - "--customer_journey_table"
              - "/dev/gold_stream/streaming_gold_customer_journey/"
              - "--item_cooccurrence_table"
              - "/dev/gold_stream/streaming_gold_item_cooccurrence/"
          environment_key: "default"
          timeout_seconds: 0
          depends_on:
            - task_key: "transform_silver_streaming"

      email_notifications:
        on_failure:
          - "admin@example.com"

      environments:
      - environment_key: "default"
        spec:
          environment_version: '2'
          dependencies:
            - pyspark
            - delta-spark
          
