resources:
  jobs:
    speed_etl_serverless:
      name: "Lambda Architecture - Speed ETL Serverless"
      description: "Real-time streaming processing from Kinesis on serverless compute"
      max_concurrent_runs: 1

      tasks:
        # Stage 1: Ingest from Kinesis to Bronze
        - task_key: "ingest_bronze"
          notebook_task:
            notebook_path: "/Workspace/Users/duybd@mz.co.kr/.bundle/lambda-architecture/dev/files/src/speed_layer/bronze_layer/ingest_data_streaming"
            parameters:
              - s3_bucket: "{{env.BATCH_S3_BUCKET}}"
              - target_table: "dev.bronze.batch_bronze"
          environment_key: "default"
          timeout_seconds: 3600
        # Stage 2: Transform Silver
        - task_key: "transform_silver"
          spark_python_task:
            python_file: "/Workspace/Users/duybd@mz.co.kr/.bundle/lambda-architecture/dev/files/src/speed_layer/silver_layer/transform_events_silver"
            parameters:
              - "--source_table"
              - "default.events_bronze"
              - "--target_table"
              - "default.events_silver"
          environment_key: "default"
          timeout_seconds: 0
          depends_on:
            - task_key: "ingest_bronze"

        # Stage 3: Aggregate Gold (Windowed)
        - task_key: "aggregate_gold"
          spark_python_task:
            python_file: "/Workspace/Users/duybd@mz.co.kr/.bundle/lambda-architecture/dev/files/src/speed_layer/gold_layer/aggregate_events_gold"
            parameters:
              - "--source_table"
              - "default.events_silver"
              - "--metrics_table"
              - "default.event_metrics_by_time"
              - "--behavior_table"
              - "default.visitor_behavior_realtime"
              - "--popularity_table"
              - "default.item_popularity_realtime"
          environment_key: "default"
          timeout_seconds: 0
          depends_on:
            - task_key: "transform_silver"

      email_notifications:
        on_failure:
          - "admin@example.com"

      environments:
        - environment_key: default
          spec:
            environment_version: '2'
            dependencies:
              - pyspark
              - delta-spark
          
