resources:
  jobs:
    batch_etl:
      name: "Lambda Architecture - Batch ETL Serverless"
      max_concurrent_runs: 1

      tasks:
        # Stage 1: Ingest from S3 to Bronze
        - task_key: "ingest_bronze"
          spark_python_task:
            python_file: "/Workspace/Users/duybd@mz.co.kr/.bundle/lambda-architecture/dev/files/src/batch_layer/bronze_layer/bronze_loader.py"
            base_parameters:
              - s3_bucket: "{{env.BATCH_S3_BUCKET}}"
              - target_table: "dev.bronze_batch.batch_bronze"
          environment_key: "default"
          timeout_seconds: 3600

        # Stage 2: Transform Silver
        - task_key: "transform_silver"
          spark_python_task:
            python_file: "/Workspace/Users/duybd@mz.co.kr/.bundle/lambda-architecture/dev/files/src/batch_layer/silver_layer/silver_transformer.py"
            parameters:
              - "--source_table"
              - "dev.bronze_batch.batch_bronze"
              - "--target_table"
              - "dev.silver_batch.batch_silver"
          environment_key: "default"
          timeout_seconds: 3600
          depends_on:
            - task_key: "ingest_bronze"

        # Stage 3: Aggregate Gold
        - task_key: "aggregate_gold"
          spark_python_task:
            python_file: "/Workspace/Users/duybd@mz.co.kr/.bundle/lambda-architecture/dev/files/src/batch_layer/gold_layer/gold_aggregator.py"
            parameters:
              - "--source_table"
              - "dev.silver_batch.batch_silver"
              - "--summary_table"
              - "dev.gold_batch.item_properties_summary"
              - "--stats_table"
              - "dev.gold_batch.property_statistics"
          environment_key: "default"
          timeout_seconds: 3600
          depends_on:
            - task_key: "transform_silver"

      # Schedule: Daily at 2 AM UTC
      schedule:
        quartz_cron_expression: "0 0 2 * * ?"
        timezone_id: "UTC"

      environments:
      - environment_key: "default"
        spec:
          environment_version: '2'
          dependencies:
            - pandas>=2.0.0 
            - numpy<2

