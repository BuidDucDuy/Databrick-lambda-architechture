# Batch Layer ETL Job Definition
resources:
  jobs:
    batch_etl:
      name: "Lambda Architecture - Batch ETL"
      description: "Daily batch processing of item properties from S3"
      max_concurrent_runs: 1
      tasks:
        # Stage 1: Ingest from S3 to Bronze
        - task_key: "ingest_bronze"
          description: "Load item properties from S3 using Autoloader"
          python_wheel_task:
            package_name: lambda_arch.batch_layer
            entry_point: bronze_ingest
            parameters:
              - s3_bucket: "{{env.BATCH_S3_BUCKET}}"
              - target_table: "default.item_properties_bronze"
          job_cluster_key: "batch_cluster"
          timeout_seconds: 3600

        # Stage 2: Transform Silver
        - task_key: "transform_silver"
          description: "Clean and deduplicate data in Silver layer"
          python_wheel_task:
            package_name: lambda_arch.batch_layer
            entry_point: silver_transform
            parameters:
              - source_table: "default.item_properties_bronze"
              - target_table: "default.item_properties_silver"
          job_cluster_key: "batch_cluster"
          timeout_seconds: 3600
          depends_on:
            - task_key: "ingest_bronze"

        # Stage 3: Aggregate Gold
        - task_key: "aggregate_gold"
          description: "Create analytics tables in Gold layer"
          python_wheel_task:
            package_name: lambda_arch.batch_layer
            entry_point: gold_aggregate
            parameters:
              - source_table: "default.item_properties_silver"
              - summary_table: "default.item_properties_summary"
              - stats_table: "default.property_statistics"
          job_cluster_key: "batch_cluster"
          timeout_seconds: 3600
          depends_on:
            - task_key: "transform_silver"

      # Schedule: Daily at 2 AM UTC
      schedule:
        quartz_cron_expression: "0 0 2 * * ?"
        timezone_id: "UTC"

      # Alerts
      email_notifications:
        on_failure:
          - "admin@example.com"
        on_success:
          - "admin@example.com"
